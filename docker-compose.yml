version: "3.9"

services:
  spark-init:
    image: tabulario/spark-iceberg:latest
    container_name: spark-init
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      - CATALOG_URI=http://iceberg-rest:8181
    volumes:
      - ./notebooks:/home/iceberg/notebooks
    depends_on:
      - iceberg-rest
      - minio
    entrypoint: /bin/bash
    command: /home/iceberg/notebooks/start.sh
  minio:
    image: minio/minio
    container_name: minio
    ports: ["9000:9000", "9001:9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  mc:
    image: minio/mc
    depends_on:
      - minio
    environment:
      MINIO_USER: ${MINIO_USER}
      MINIO_PASSWORD: ${MINIO_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set minio http://minio:9000 admin admin123; do echo '...Esperando a MinIO...'; sleep 1; done;
      /usr/bin/mc mb --ignore-existing minio/warehouse;
      /usr/bin/mc mb --ignore-existing minio/landing;
      /usr/bin/mc mb --ignore-existing minio/processed;
      echo 'Buckets creados. Listo.';
      exit 0;
      "

  iceberg-rest:
    image: tabulario/iceberg-rest:${ICEBERG_REST_VERSION}
    container_name: iceberg-rest
    hostname: rest
    ports: ["8181:8181"]
    depends_on: [minio]
    environment:
      CATALOG_CATALOG__IMPL: org.apache.iceberg.jdbc.JdbcCatalog
      CATALOG_URI: jdbc:postgresql://postgres:5432/airflow
      CATALOG_JDBC_USER: airflow
      CATALOG_JDBC_PASSWORD: airflow
      CATALOG_WAREHOUSE: ${CATALOG_WAREHOUSE}
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
      CATALOG_S3_ACCESS__KEY__ID: ${MINIO_USER}
      CATALOG_S3_SECRET__ACCESS__KEY: ${MINIO_PASSWORD}
      AWS_REGION: ${AWS_REGION}

  trino:
    image: trinodb/trino:${TRINO_VERSION}
    container_name: trino
    ports: ["8080:8080"]
    depends_on: [iceberg-rest, minio]
    volumes:
      - ./infrastructure/trino/catalog:/etc/trino/catalog

  spark-iceberg:
    build: 
      context: .
      dockerfile: ./infrastructure/Dockerfile.spark
    container_name: spark-iceberg
    ports:
      - "8888:8888" # Jupyter
      - "8081:8080" # Spark UI
      - "10000:10000"
      - "10001:10001"
    depends_on: [iceberg-rest, minio]
    environment:
      - AWS_ACCESS_KEY_ID=${MINIO_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_PASSWORD}
      - AWS_REGION=${AWS_REGION}
      - CATALOG_URI=${CATALOG_URI}
    volumes:
      - ./notebooks:/home/iceberg/notebooks
      - ./jobs:/home/iceberg/jobs
      - ./data:/home/iceberg/data
    links:                                    
      - iceberg-rest:rest
      - minio
  postgres:
    image: postgres:13
    container_name: postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  airflow-init:
    build: 
      context: .
      dockerfile: ./infrastructure/Dockerfile.airflow
    container_name: airflow-init
    depends_on:
      - postgres
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__INIT__SECRET_KEY=${AIRFLOW__INIT__SECRET_KEY}
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    entrypoint: /bin/bash
    command: -c "airflow db init && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com"
    volumes:
      - ./dags:/opt/airflow/dags
  airflow-webserver:
    build: 
      context: .
      dockerfile: ./infrastructure/Dockerfile.airflow
    container_name: airflow-webserver
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8085:8080" # Usamos el 8085 porque Trino ya usa el 8080
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW__WEBSERVER__SECRET_KEY}
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
    command: webserver
  airflow-scheduler:
    build: 
      context: .
      dockerfile: ./infrastructure/Dockerfile.airflow
    container_name: airflow-scheduler
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres/airflow
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__SCHEDULER__SECRET_KEY=${AIRFLOW__SCHEDULER__SECRET_KEY}
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    volumes:
      - ./dags:/opt/airflow/dags
      - ./jobs:/opt/airflow/jobs
      - ./notebooks:/home/iceberg/notebooks
      - ./logs:/opt/airflow/logs
    command: scheduler
  kafka:
    image: bitnamilegacy/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_ENABLE_KRAFT=yes
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - ALLOW_PLAINTEXT_LISTENER=yes
    volumes:
      - kafka_data:/bitnami/kafka
  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    ports:
      - "3000:3000"
    environment:
      - MB_DB_FILE=/metabase-data/metabase.db
    volumes:
      - ./infrastructure/metabase-data:/metabase-data
    depends_on:
      - trino
  spark-consumer:
    build:
      context: .
      dockerfile: infrastructure/Dockerfile.spark
    container_name: spark-consumer
    depends_on:
      - kafka
      - trino
    volumes:
      - ./jobs:/home/iceberg/jobs
      - ./warehouse:/home/iceberg/warehouse
      - ./infrastructure/trino/catalog:/home/iceberg/warehouse/catalog
    environment:
      - SPARK_HOME=/opt/spark
      - PYTHONPATH=$SPARK_HOME/python:$SPARK_HOME/python/lib/py4j-0.10.9.7-src.zip
      - AWS_REGION=${AWS_REGION}
      - AWS_ACCESS_KEY_ID=${MINIO_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_PASSWORD}
      - HADOOP_OPT_AWS_ACCESS_KEY_ID=admin
      - HADOOP_OPT_AWS_SECRET_ACCESS_KEY=admin123
      - MINIO_USER=${MINIO_USER}
      - MINIO_PASSWORD=${MINIO_PASSWORD}
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "echo '⏳ Esperando 15 segundos a que Kafka y Trino respiren...' && 
      sleep 15 && 
      echo '🚀 Lanzando Consumidor Automático...' && 
      /opt/spark/bin/spark-submit --packages org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.5,org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262 /home/iceberg/jobs/consumidor_player.py"
    restart: unless-stopped
volumes:
  minio_data:
  postgres_data:
  kafka_data: