version: "3.9"

services:
  spark-init:
    image: tabulario/spark-iceberg:latest
    container_name: spark-init
    environment:
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=admin123
      - AWS_REGION=us-east-1
      - CATALOG_URI=http://iceberg-rest:8181
    volumes:
      - ./notebooks:/home/iceberg/notebooks
    depends_on:
      - iceberg-rest
      - minio
    entrypoint: /bin/bash
    command: /home/iceberg/notebooks/start.sh
  minio:
    image: minio/minio
    container_name: minio
    ports: ["9000:9000", "9001:9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  mc:
    image: minio/mc
    depends_on:
      - minio
    environment:
      MINIO_USER: ${MINIO_USER}
      MINIO_PASSWORD: ${MINIO_PASSWORD}
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set minio http://minio:9000 admin admin123; do echo '...Esperando a MinIO...'; sleep 1; done;
      /usr/bin/mc mb --ignore-existing minio/warehouse;
      /usr/bin/mc mb --ignore-existing minio/landing;
      /usr/bin/mc mb --ignore-existing minio/processed;
      echo 'Buckets creados. Listo.';
      exit 0;
      "

  iceberg-rest:
    image: tabulario/iceberg-rest:${ICEBERG_REST_VERSION}
    container_name: iceberg-rest
    hostname: rest
    ports: ["8181:8181"]
    depends_on: [minio]
    environment:
      CATALOG_WAREHOUSE: ${CATALOG_WAREHOUSE}
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
      CATALOG_S3_ACCESS__KEY__ID: ${MINIO_USER}
      CATALOG_S3_SECRET__ACCESS__KEY: ${MINIO_PASSWORD}
      AWS_REGION: ${AWS_REGION}

  trino:
    image: trinodb/trino:${TRINO_VERSION}
    container_name: trino
    ports: ["8080:8080"]
    depends_on: [iceberg-rest, minio]
    volumes:
      - ./trino/catalog:/etc/trino/catalog

  spark-iceberg:
    image: tabulario/spark-iceberg:${SPARK_ICEBERG_VERSION}
    container_name: spark-iceberg
    ports:
      - "8888:8888" # Jupyter
      - "8081:8080" # Spark UI
    depends_on: [iceberg-rest, minio]
    environment:
      - AWS_ACCESS_KEY_ID=${MINIO_USER}
      - AWS_SECRET_ACCESS_KEY=${MINIO_PASSWORD}
      - AWS_REGION=${AWS_REGION}
      - CATALOG_URI=${CATALOG_URI}
    volumes:
      - ./notebooks:/home/iceberg/notebooks
    links:                                    
      - iceberg-rest:rest
      - minio

volumes:
  minio_data: